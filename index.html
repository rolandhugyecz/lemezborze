<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lemezbörze</title>
  </head>
  <body class="bg-[#A3E7FC]">
    <nav class="bg-[#26C485] rounded-2xl m-2.5 sticky top-0 z-10">
      <div class="h-22 flex items-center justify-between text-white text-xl font-bold">
        <a href="index.html">
          <div class="px-4 flex items-center gap-4"> <!-- Logo -->
            <img src="/src/assets/logo.png" alt="Logo" class="w-15 h-15">
            <h1 class="text-2xl font-bold text-gray-100">Lemezbörze</h1>
          </div>
        </a>
        <div class="hidden md:flex px-4 items-center gap-4"> <!-- Gombok -->
          <a href="index.html">
            <div class="px-4 flex items-center gap-2 rounded-2xl hover:bg-[#36a87b]">
              <h1 id="Home">Kezdőlap</h1>
              <img src="src/assets/homeicon.png" alt="home" class="w-10">
            </div>
          </a>
          <a href="kapcsolat.html" target="_blank">
            <div class="px-4 flex items-center gap-2 rounded-2xl hover:bg-[#36a87b]">
              <h1>Kapcsolat</h1>
              <img src="src/assets/contacticon.png" alt="home" class="w-10">
            </div>
          </a>
            <form>
              <select id="currency" class="px-3 rounded-2xl hover:bg-[#36a87b] py-2.5 bg-[#26C485] border">
                <option value="HUF">HUF Ft</option>
                <option value="USD">USD $</option>
                <option value="EUR">EUR €</option>
                <option value="GBP">GBP £</option>
              </select>
            </form>
          <button type="button" class="cursor-pointer border-2 rounded-4xl mx-6 hover:bg-[#36a87b]"><img src="src/assets/cart.png" alt="Kosár" class="w-12"></button>
        </div>
        <button type="button" class="m-10 cursor-pointer md:hidden" id="burgerBtn">
          <img src="src/assets/burger.png" alt="burgericon" class="w-15 h-15" id="burger">
        </button>
      </div>
      <div class="flex md:hidden text-white text-xl font-bold justify-end text-right"> <!-- Flex Gombok -->
          <div id="flexBtns" class=" mr-5">
          </div>
        </div>
    </nav>
    <div class="flex justify-between">
      <div>
        <div class="flex">
          <form>
            <select id="sorting" class="w-[70%] m-5 px-3 rounded-2xl hover:bg-[#36a87b] py-2.5 bg-[#26C485] border">
              <option value="Valassz">Szűrés</option>
              <option value="AZ">A-Z</option>
              <option value="ZA">Z-A</option>
              <option value="KN">Kiadás éve szerint növekvő</option>
              <option value="KCS">Kiadás éve szerint csökkenő</option>
              <option value="AN">Ár szerint növekvő</option>
              <option value="ACS">Ár szerint csökkenő</option>
            </select>
          </form>
        </div>
      </div>
      <div class="">
        <input type="text" name="search"  id="search" placeholder="Keresés..." class="size-full p-3 border rounded-2xl">
      </div>
        <div class="flex">
          <form>
            <select id="sorting" class="w-[50%] px-3 rounded-2xl hover:bg-[#36a87b] py-2.5 bg-[#26C485] border">
              <option value="Valassz">Rendezés</option>
              <option value="AZ">A-Z</option>
              <option value="ZA">Z-A</option>
              <option value="KN">Kiadás éve szerint növekvő</option>
              <option value="KCS">Kiadás éve szerint csökkenő</option>
              <option value="AN">Ár szerint növekvő</option>
              <option value="ACS">Ár szerint csökkenő</option>
            </select>
          </form>
        </div>
    </div>
    <div class="m-4 flex">
      <div class="border-collapse table-auto md:table-fixed flex-12">
        <table class="w-[95%]" >
          <thead class="table-auto md:table-header-group bg-[#bdafb3]">
            <th class="p-2 text-left font-medium border border-gray-200 table-cell">Előadó</th>
            <th class="p-2 text-left font-medium border border-gray-200 table-cell">Cím</th>
            <th class="p-2 text-left font-medium border border-gray-200 table-cell">Kiadás éve</th>
            <th class="p-2 text-left font-medium border border-gray-200 table-cell">Kiadó</th>
            <th class="p-2 text-left font-medium border border-gray-200 table-cell">Ár</th>
            <th class="p-2 w-35 text-left font-medium border border-gray-200 table-cell">Borító</th>
            <th class="bg-[#A3E7FC] "></th>
            <th class="p-2 text-left font-medium table-cell bg-[#A3E7FC]">
          </thead>
          <tbody id="tablazatBody" class="">
          </tbody>
        </table>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
